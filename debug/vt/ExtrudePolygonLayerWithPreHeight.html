<!doctype html>
<html>

  <title>Maptalks 地形加载示例</title>
  <style type="text/css">
    html,
    body {
      margin: 0px;
      height: 100%;
      width: 100%;
    }
    .container {
      width: 100%;
      height: 100%;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border-radius: 4px;
      z-index: 1000;
    }
    .layer-list {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255, 255, 255, 0.9);
      padding: 10px;
      border-radius: 4px;
      z-index: 1000;
      font-size: 12px;
    }
    .flv-player,
    .flv-player1 {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 320px;
      height: 180px;
      background: #000;
      border-radius: 4px;
      z-index: 1000;
      overflow: hidden;
    }

    .flv-player video {
      width: 100%;
      height: 100%;
    }
  </style>

  <body>
    <div id="map" class="container"></div>
    <div id="layerList" class="layer-list" style="display: none">
      <h4>已加载图层:</h4>
      <ul id="layers"></ul>
    </div>

    <script>
      let map = null;
      // 图层集合
      const layers = [];
      let groupLayer = null;

      /**
       * 加载所有图层
       */
      async function loadLayers() {
        try {

          const skinLayers = [
              new maptalks.TileLayer('base', {
                  maxAvailableZoom : 20,
                  'urlTemplate' : 'http://webst{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',
                  'subdomains'  : ['01','02','03','04'],
                  attribution: '&copy; <a href="http://osm.org">OpenStreetMap</a> contributors, &copy; <a href="https://carto.com/">CARTO</a>'
                })
          ];

          // 创建GroupGLLayer，包含地形和所有图层
          const sceneConfig = {
            environment: {
              enable: true,
              mode: 1,
              level: 0,
              brightness: 0.489,
            },
            shadow: {
              type: "esm",
              enable: true,
              quality: "high",
              opacity: 0.5,
              color: [0, 0, 0],
              blurOffset: 1,
            },
            postProcess: {
              enable: true,
              antialias: { enable: true },
              bloom: {
                enable: true,
                threshold: 0,
                factor: 1,
                radius: 0.02,
              },
            },
            ground: {
              enable: true,
              renderPlugin: {
                type: "fill",
              },
              symbol: {
                polygonFill: [
                  0.803921568627451, 0.803921568627451, 0.803921568627451, 1,
                ],
                polygonOpacity: 1,
              },
            },
          };

          const dataConfig = {
            type: '3d-extrusion',
            heightProperty: 'height',
            altitudeScale: 1,
            defaultAltitude: 0,
            top: true,
            side: true,
            perPositionHeight: true
            // sideVerticalUVMode: 1
            // textureYOrigin: 'bottom'
        };

        const material = {
            'baseColorFactor': [1, 1, 1, 1],
            'emissiveFactor': [1, 1, 1],
            'roughnessFactor': 0,
            'metalnessFactor': 0,
            'outputSRGB': 0,
            'uvScale': [0.001, 0.0013]
        };

        const extrudeLayer = new maptalks.ExtrudePolygonLayer('vector', { dataConfig, material, geometryEvents: false })
        


          groupLayer = new maptalks.GroupGLLayer("group", skinLayers, {
            sceneConfig,
          });

          groupLayer.addTo(map);
          extrudeLayer.addTo(groupLayer)

        const polygons = maptalks.GeoJSON.toGeometry(geojson);
        polygons.forEach(polygon => {
            polygon.setSymbol({
                topPolygonFill: '#fff',
                bottomPolygonFill: '#000',
            });
            polygon.setProperties({
                height: 100
            })
        });
        console.log(polygons)
        extrudeLayer.addGeometry(polygons);

          
        } catch (error) {
        } finally {
        }
      }

     
      const initMap = () => {

        // 初始化地图
        map = new maptalks.Map("map", {
          // center: [120.0419, 30.58051],
          center: [120.22209014022826,29.838260769735417],
          // center: [119.72798, 30.93029],
          zoom: 18.5,
          renderer: "gl",
          pitch: 0,
          bearing: 175.29,
          lights: {
            directional: {
              direction: [1, 0, -1],
              color: [1, 1, 1],
            },
          },
        });
        loadLayers();
      };
      const remove = () => {
        map.remove();
      };
      initMap()
    </script>
